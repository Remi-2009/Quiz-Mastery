<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fun Quiz</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <!-- START SCREEN -->
        <section id="start-screen" class="screen active">
            <div class="card">
                <h1>Fun Quiz</h1>
                <p class="subtitle">
                    Prepare to question your intelligence,your life choices and your education! It's showtime.
                </p>
                <button id="start-btn" class="primary-btn">
                    Start Quiz
                </button>
            </div>
        </section>

        <!-- QUIZ SCREEN -->
        <section id="quiz-screen" class="screen">
            <div class="quiz-card">

                <div class="top-bar">
                    <span id="question-counter">Question 1 of 10</span>
                    <span id="score-display">Score: 0</span>
                </div>

                <div class="timer-container">
                    <div id="timer-bar"></div>
                </div>

                <div class="timer-text">
                    Time Left: <span id="timer">15</span>s
                </div>

                <h2 id="question-text"></h2>

                <div id="options-container" class="options-container"></div>

                <button id="hint-btn" class="primary-btn hint-btn">
                💡 Hint
                </button>
                <p id="hint-text"></p>

            </div>
        </section>

        <!-- END SCREEN -->
        <section id="end-screen" class="screen">
            <div class="card">

                <h2>Quiz Complete!</h2>

                <div class="final-score">
                    Final Score: <span id="final-score">0</span>
                </div>

                <p id="performance-message"></p>

                <div class="leaderboard">
                    <h3>🏆 Top 5 Scores</h3>
                    <ol id="leaderboard-list"></ol>
                </div>

                <button id="play-again-btn" class="primary-btn">
                    Play Again(if you can)
                </button>

            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
